<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
  <title>Barikade – Online (Server-Mode)</title>
  <link rel="stylesheet" href="./style.css?v4_20251222_102302"/>
</head>
<body>
  <div class="appShell">
    <header class="topBar">
      <div class="topLeft">
        <div class="title">🎯 Barikade</div>
        <div class="sub">Online • Server steuert Würfel + Züge • 2 Spieler</div>
      </div>

      <div class="topActions">
        <button id="btnNew" class="btn">Neues Spiel (lokal)</button>
        <button id="btnRoll" class="btn primary">Würfeln</button>

        <div class="diceWrap">
          <div id="dice" class="dice" data-value="0" aria-label="Würfel"></div>
          <div class="turn" id="turnLabel">Spieler: <span class="pill red">Rot</span></div>
        </div>
      </div>
    </header>

    <main class="mainGrid">
      <section class="boardPanel">
        <canvas id="boardCanvas"></canvas>

        <!-- Dice overlay (groß in der Mitte beim Wurf) -->
        <div id="diceOverlay" class="diceOverlay" aria-hidden="true">
          <div class="diceCenter">
            <div id="diceFloat" class="dice big" data-value="1"></div>
            <div class="diceText">Würfeln…</div>
          </div>
        </div>

        <div class="statusBar">
          <div id="hint" class="hint">…</div>
          <div class="stats">
            <div><span class="k">Board:</span> <span id="boardStats">–</span></div>
            <div><span class="k">Wurf:</span> <span id="rollStats">–</span></div>
            <div><span class="k">Aktion:</span> <span id="actionStats">–</span></div>
          </div>
        </div>
      </section>

      <aside class="sidePanel">
        <div class="panelCard">
          <div class="panelTitle">🌐 Online Lobby</div>
          <div class="row">
            <label>Server</label>
            <div class="mono" id="serverLabel">–</div>
          </div>

          <div class="row">
            <label>Raumcode</label>
            <input id="roomCode" class="input" placeholder="z.B. ABCD" maxlength="10" autocapitalize="characters"/>
          </div>

          <div class="row">
            <label>Name</label>
            <input id="playerName" class="input" placeholder="Dein Name" maxlength="18"/>
          </div>

          <div class="btnRow">
            <button id="btnHost" class="btn">Host</button>
            <button id="btnJoin" class="btn">Beitreten</button>
          </div>

          <div class="btnRow">
            <button id="btnStart" class="btn primary disabled" disabled>Start</button>
            <button id="btnLeave" class="btn disabled" disabled>Leave</button>
          </div>

          <div id="netHint" class="netHint">…</div>
        </div>

        <div class="panelCard">
          <div class="panelTitle">👥 Spieler</div>
          <div id="playersList" class="playersList">–</div>
        </div>

        <div class="panelCard">
          <div class="panelTitle">🧪 Debug</div>
          <div class="btnRow">
            <button id="btnCopyDiag" class="btn">Debug kopieren</button>
            <button id="btnClearLog" class="btn">Log leeren</button>
          </div>
          <pre id="netDebug" class="monoBox">–</pre>
          <pre id="netLog" class="monoBox">–</pre>
        </div>

        <div class="panelCard smallNote">
          <div class="panelTitle">Bedienung</div>
          <ul>
            <li>Mausrad: Zoom</li>
            <li>Drag: Pan</li>
            <li>Touch: 1 Finger Pan, 2 Finger Pinch</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="./app.js?v4_20251222_102302"></script>
</body>
</html>
